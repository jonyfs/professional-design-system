<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Tags Input — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-8/assets/tagsInput-D-WraF-g.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/theme-switcher-Dz2I4cAh.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/gallery-theme-selector-C0XjAsP1.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/theme-switcher-cWaKgV8M.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-8/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Tags Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Freeform multi-value entry — no fixed option list. Enter or comma
    commits the current text as a removable tag; Backspace on an empty
    field removes the last one; pasting comma/newline-separated text
    splits into multiple tags at once.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-sm">
    <label for="tags-input-field" class="mb-1 block text-sm font-medium text-neutral-900">
      Skills
    </label>
    <div data-tags-input data-testid="tags-input-demo" class="tags-input">
      <div data-tags-input-list class="contents"></div>
      <input
        id="tags-input-field"
        data-tags-input-field
        class="tags-input-field"
        type="text"
        aria-label="Add a skill"
        placeholder="Add a skill…"
      />
      <input data-tags-input-value type="hidden" name="skills" />
    </div>
  </div>

</body>
</html>

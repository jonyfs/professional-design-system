<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>RingProgress — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-8/assets/ringProgress-DureZe_z.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/theme-switcher-Dz2I4cAh.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/gallery-theme-selector-C0XjAsP1.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/circular-progress-DHar0Tmv.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/theme-switcher-cWaKgV8M.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-8/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">RingProgress</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Circular progress indicator — an SVG arc whose proportion tracks
    the value, with an accessible text equivalent never conveyed by
    shape alone.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 flex flex-wrap gap-8">
    <div class="text-center">
      <div
        data-testid="circular-progress-0"
        class="circular-progress"
        role="progressbar"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-labelledby="ring-label-0"
      >
        <span class="sr-only" id="ring-label-0">Storage used: 0%</span>
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="circular-progress-track" cx="40" cy="40" r="36" stroke-width="8" />
          <circle
            class="circular-progress-fill"
            data-circular-progress-fill
            data-value="0"
            data-circumference="226.19"
            cx="40" cy="40" r="36" stroke-width="8"
            stroke-dasharray="226.19"
            transform="rotate(-90 40 40)"
          />
        </svg>
      </div>
      <p class="mt-2 text-sm text-neutral-600">0%</p>
    </div>

    <div class="text-center">
      <div
        data-testid="circular-progress-60"
        class="circular-progress"
        role="progressbar"
        aria-valuenow="60"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-labelledby="ring-label-60"
      >
        <span class="sr-only" id="ring-label-60">Storage used: 60%</span>
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="circular-progress-track" cx="40" cy="40" r="36" stroke-width="8" />
          <circle
            class="circular-progress-fill"
            data-circular-progress-fill
            data-value="60"
            data-circumference="226.19"
            cx="40" cy="40" r="36" stroke-width="8"
            stroke-dasharray="226.19"
            transform="rotate(-90 40 40)"
          />
        </svg>
      </div>
      <p class="mt-2 text-sm text-neutral-600">60%</p>
    </div>

    <div class="text-center">
      <div
        data-testid="circular-progress-100"
        class="circular-progress"
        role="progressbar"
        aria-valuenow="100"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-labelledby="ring-label-100"
      >
        <span class="sr-only" id="ring-label-100">Storage used: 100%</span>
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="circular-progress-track" cx="40" cy="40" r="36" stroke-width="8" />
          <circle
            class="circular-progress-fill circular-progress-fill-success"
            data-circular-progress-fill
            data-value="100"
            data-circumference="226.19"
            cx="40" cy="40" r="36" stroke-width="8"
            stroke-dasharray="226.19"
            transform="rotate(-90 40 40)"
          />
        </svg>
      </div>
      <p class="mt-2 text-sm text-neutral-600">100%</p>
    </div>
  </div>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Cascader — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-8/assets/cascader-ByDkGPhp.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/theme-switcher-NAOvpRiF.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/gallery-theme-selector-4_iKoj2_.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-8/assets/theme-switcher-uR57PTZh.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-8/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Cascader</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Hierarchical multi-level select. Opening a level renders its
    children as a new panel; the trigger only commits once a leaf is
    chosen. Escape closes without changing a previously committed
    value.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-sm">
    <span class="mb-1 block text-sm font-medium text-neutral-900">Region</span>
    <div
      data-cascader
      data-testid="cascader-demo"
      class="relative"
      data-tree='[{"id":"eu","label":"Europe","children":[{"id":"pt","label":"Portugal"},{"id":"de","label":"Germany"}]},{"id":"na","label":"North America","children":[{"id":"us","label":"United States"},{"id":"ca","label":"Canada"}]}]'
    >
      <button type="button" data-cascader-trigger class="cascader-trigger" aria-haspopup="listbox">
        Select a region
      </button>
      <div data-cascader-panels class="cascader-panels" hidden></div>
      <input data-cascader-value type="hidden" name="region" />
    </div>
  </div>

</body>
</html>

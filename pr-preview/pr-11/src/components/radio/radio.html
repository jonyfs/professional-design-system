<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Radio — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-11/assets/theme-switcher-i8HUr_iT.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-11/assets/gallery-theme-selector-Bbhn7Nok.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-11/assets/theme-switcher-CmcB8pAh.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-11/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Radio</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <section class="mt-8">
    <h2 class="text-sm font-semibold text-neutral-600">Shipping method</h2>
    <fieldset data-testid="radio-group" class="mt-2 space-y-2 p-1">
      <legend class="sr-only">Shipping method</legend>

      <div class="flex items-center gap-2">
        <input
          id="radio-standard"
          data-testid="radio-standard"
          type="radio"
          name="shipping-method"
          checked
          class="radio-input"
        />
        <label for="radio-standard" class="text-sm text-neutral-900 cursor-pointer">
          Standard (5-7 days)
        </label>
      </div>

      <div class="flex items-center gap-2">
        <input
          id="radio-express"
          data-testid="radio-express"
          type="radio"
          name="shipping-method"
          class="radio-input"
        />
        <label for="radio-express" class="text-sm text-neutral-900 cursor-pointer">
          Express (1-2 days)
        </label>
      </div>

      <div class="flex items-center gap-2">
        <input
          id="radio-disabled"
          data-testid="radio-disabled"
          type="radio"
          name="shipping-method"
          disabled
          class="peer radio-input"
        />
        <label
          for="radio-disabled"
          class="text-sm text-neutral-900 peer-disabled:opacity-50"
        >
          Same-day (unavailable)
        </label>
      </div>
    </fieldset>
  </section>

  <section class="mt-8">
    <h2 class="text-sm font-semibold text-neutral-600">Edge case — long label</h2>
    <div data-testid="radio-long-label-wrapper" class="mt-2 max-w-xs">
      <div class="flex items-start gap-2">
        <input
          id="radio-long-label"
          data-testid="radio-long-label-input"
          type="radio"
          name="long-label-demo"
          class="radio-input mt-0.5 shrink-0"
        />
        <label for="radio-long-label" class="text-sm text-neutral-900 cursor-pointer">
          This is a significantly longer option label than usual, long enough to wrap
          across multiple lines in a narrow container
        </label>
      </div>
    </div>
  </section>
</body>
</html>

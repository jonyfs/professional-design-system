<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Password Strength Meter — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-11/assets/passwordStrengthMeter-BeOZUzTf.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-11/assets/theme-switcher-i8HUr_iT.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-11/assets/gallery-theme-selector-Bbhn7Nok.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-11/assets/theme-switcher-CmcB8pAh.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-11/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Password Strength Meter</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Live strength feedback while typing, reusing Progress's existing
    fill/track mechanism — the level is always exposed as accessible
    text, never by color alone.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-md">
    <label for="password-strength-input" class="text-sm font-medium text-neutral-900">Password</label>
    <input
      id="password-strength-input"
      type="password"
      data-password-strength-input
      data-testid="password-strength-input"
      class="mt-1 block w-full rounded-md border-0 bg-neutral-50 py-1.5 text-neutral-900 shadow-sm
             ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
             focus:ring-2 focus:ring-inset focus:ring-brand
             sm:text-sm sm:leading-6"
      autocomplete="new-password"
    />
    <div
      class="progress-track mt-2"
      role="progressbar"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-label="Password strength"
      data-testid="password-strength-track"
    >
      <div
        data-password-strength-fill="password-strength-input"
        data-testid="password-strength-fill"
        class="progress-fill password-strength-meter-fill"
      ></div>
    </div>
    <!-- Separate from the progressbar's accessible name (aria-label
         above, always non-empty): aria-live announces the level as it
         changes without ever making the name itself reference an
         empty node (axe: aria-progressbar-name), which the initial
         untyped state would otherwise violate. -->
    <span
      id="password-strength-label"
      data-password-strength-label="password-strength-input"
      data-testid="password-strength-label"
      aria-live="polite"
      class="mt-1 inline-block text-xs text-neutral-600"
    ></span>
  </div>

</body>
</html>

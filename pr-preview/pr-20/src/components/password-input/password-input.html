<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Password Input — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-20/assets/passwordInput-BDfpA_NN.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/theme-switcher-Bw9K5fNi.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/gallery-theme-selector--qsFfMOI.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/theme-switcher-CNSCDKmQ.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-20/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Password Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Text Input's ratified shell plus a show/hide toggle. Toggling flips the
    field between <code>password</code> and <code>text</code> without losing
    the typed value or caret position; the button label always names the
    next action.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 grid max-w-sm gap-8">
    <section data-testid="password-input-wrapper" class="space-y-1">
      <label for="password-input" class="text-sm font-medium text-neutral-900">
        Password
      </label>
      <div class="relative">
        <input
          id="password-input"
          data-testid="password-input"
          type="password"
          autocomplete="current-password"
          value="s3cret-value"
          class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 pr-11 text-neutral-900 shadow-sm
                 ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
                 focus:ring-2 focus:ring-inset focus:ring-brand
                 disabled:opacity-50 disabled:cursor-not-allowed
                 sm:text-sm sm:leading-6"
        />
        <button
          type="button"
          data-testid="password-input-toggle"
          aria-label="Show password"
          aria-pressed="false"
          class="absolute inset-y-0 right-0 flex items-center px-3 text-neutral-600
                 hover:text-neutral-900 active:text-neutral-900
                 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand
                 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg data-icon="show" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10 4c-3.9 0-7.2 2.4-8.6 5.7a.8.8 0 0 0 0 .6C2.8 13.6 6.1 16 10 16s7.2-2.4 8.6-5.7a.8.8 0 0 0 0-.6C17.2 6.4 13.9 4 10 4Zm0 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z" />
          </svg>
          <svg data-icon="hide" class="hidden h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M3.3 2.3a1 1 0 0 0-1.4 1.4l2.1 2.1A11 11 0 0 0 1.4 9.7a.8.8 0 0 0 0 .6C2.8 13.6 6.1 16 10 16a10 10 0 0 0 3.6-.7l3.1 3.1a1 1 0 0 0 1.4-1.4L3.3 2.3Zm7.8 10.6A3 3 0 0 1 7.1 8.9l1.3 1.3a1 1 0 0 0 1.4 1.4l1.3 1.3ZM10 6c.4 0 .8 0 1.1.1L7.4 2.4A11 11 0 0 1 10 2c3.9 0 7.2 2.4 8.6 5.7a.8.8 0 0 1 0 .6 11 11 0 0 1-2.4 3.4l-2.9-2.9A4 4 0 0 0 10 6Z" />
          </svg>
        </button>
      </div>
    </section>

    <section data-testid="password-input-disabled-wrapper" class="space-y-1">
      <label for="password-input-disabled" class="text-sm font-medium text-neutral-900">
        Disabled
      </label>
      <div class="relative">
        <input
          id="password-input-disabled"
          data-testid="password-input-disabled"
          type="password"
          value="s3cret-value"
          disabled
          class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 pr-11 text-neutral-900 shadow-sm
                 ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
                 focus:ring-2 focus:ring-inset focus:ring-brand
                 disabled:opacity-50 disabled:cursor-not-allowed
                 sm:text-sm sm:leading-6"
        />
      </div>
    </section>
  </div>

</body>
</html>

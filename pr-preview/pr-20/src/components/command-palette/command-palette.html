<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Command Palette — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-20/assets/commandPalette-Dmcw4MtP.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/theme-switcher-Bw9K5fNi.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/gallery-theme-selector--qsFfMOI.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/overlay-TYHDIv5r.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/theme-switcher-CNSCDKmQ.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-20/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Command Palette</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Press
    <kbd class="kbd">⌘K</kbd>
    or
    <kbd class="kbd">Ctrl K</kbd>
    from anywhere on this page to open it.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>
  <p class="mt-4 text-sm text-neutral-600" data-testid="command-palette-hint">
    Shortcut: <strong>⌘K</strong> / <strong>Ctrl+K</strong>
  </p>

  <a href="#" class="back-link mt-8 inline-block" data-testid="unrelated-focus-target">An unrelated link, for focus-state testing</a>

  <dialog id="command-palette" data-testid="command-palette" class="command-palette-dialog">
    <input
      type="text"
      id="command-palette-input"
      role="combobox"
      aria-expanded="true"
      aria-controls="command-palette-list"
      aria-activedescendant=""
      aria-autocomplete="list"
      autocomplete="off"
      autofocus
      data-testid="command-palette-input"
      class="command-palette-input"
      placeholder="Type a command or search…"
    />
    <ul id="command-palette-list" role="listbox" data-testid="command-palette-list" class="command-palette-list"></ul>
  </dialog>

  <p aria-live="polite" data-testid="command-palette-confirmation" class="sr-only"></p>

</body>
</html>

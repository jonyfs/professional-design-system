<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Tooltip — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-20/assets/theme-switcher-Bw9K5fNi.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-20/assets/gallery-theme-selector--qsFfMOI.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-20/assets/theme-switcher-CNSCDKmQ.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-20/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Tooltip</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Zero-JavaScript hover/focus label, positioned with CSS Anchor Positioning.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="tooltip-demo-wrapper" class="mt-16 flex max-w-md gap-12">
    <span class="tooltip-wrapper" data-testid="tooltip-default-wrapper">
      <button
        type="button"
        data-testid="tooltip-default-trigger"
        aria-describedby="tooltip-default-label"
        class="btn-secondary tooltip-anchor-1"
      >
        <span aria-hidden="true">🗑</span>
        <span class="sr-only">Delete</span>
      </button>
      <span
        role="tooltip"
        id="tooltip-default-label"
        data-testid="tooltip-default-label"
        class="tooltip tooltip-top tooltip-target-1"
      >
        Delete item
      </span>
    </span>

    <span class="tooltip-wrapper" data-testid="tooltip-disabled-wrapper">
      <button
        type="button"
        disabled
        aria-describedby="tooltip-disabled-label"
        class="btn-secondary tooltip-anchor-2"
      >
        <span aria-hidden="true">🔒</span>
        <span class="sr-only">Archive (unavailable)</span>
      </button>
      <span
        role="tooltip"
        id="tooltip-disabled-label"
        data-testid="tooltip-disabled-label"
        class="tooltip tooltip-top tooltip-target-2"
      >
        Not available on the free plan
      </span>
    </span>
  </div>
</body>
</html>

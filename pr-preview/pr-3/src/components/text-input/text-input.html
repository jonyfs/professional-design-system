<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Text Input — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-NAOvpRiF.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-3/assets/gallery-theme-selector-4_iKoj2_.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-uR57PTZh.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-3/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Text Input</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 grid max-w-sm gap-8">
    <section data-testid="input-default-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">Default / focus</h2>
      <label for="input-default" class="text-sm font-medium text-neutral-900">
        Email address
      </label>
      <input
        id="input-default"
        data-testid="input-default"
        type="text"
        class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
               focus:ring-2 focus:ring-inset focus:ring-brand
               sm:text-sm sm:leading-6"
        placeholder="you@example.com"
      />
    </section>

    <section data-testid="input-error-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">Error</h2>
      <label for="input-error" class="text-sm font-medium text-neutral-900">
        Email address
      </label>
      <input
        id="input-error"
        data-testid="input-error"
        type="text"
        aria-invalid="true"
        aria-describedby="input-error-message"
        value="not-an-email"
        class="block w-full rounded-md border-0 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-error focus:ring-2 focus:ring-inset
               focus:ring-error sm:text-sm sm:leading-6"
      />
      <p id="input-error-message" class="text-xs text-error-strong mt-1 font-medium">
        Enter a valid email address.
      </p>
    </section>

    <section data-testid="input-error-placeholder-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">
        Error + placeholder together (Edge Case)
      </h2>
      <label for="input-error-with-placeholder" class="text-sm font-medium text-neutral-900">
        Email address
      </label>
      <input
        id="input-error-with-placeholder"
        data-testid="input-error-with-placeholder"
        type="text"
        aria-invalid="true"
        aria-describedby="input-error-with-placeholder-message"
        placeholder="you@example.com"
        class="block w-full rounded-md border-0 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-error focus:ring-2 focus:ring-inset
               focus:ring-error sm:text-sm sm:leading-6"
      />
      <p
        id="input-error-with-placeholder-message"
        class="text-xs text-error-strong mt-1 font-medium"
      >
        Enter a valid email address.
      </p>
    </section>

    <section data-testid="input-disabled-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">Disabled</h2>
      <label for="input-disabled" class="text-sm font-medium text-neutral-900">
        Email address
      </label>
      <input
        id="input-disabled"
        data-testid="input-disabled"
        type="text"
        disabled
        value="you@example.com"
        class="block w-full rounded-md border-0 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
               focus:ring-2 focus:ring-inset focus:ring-brand
               disabled:opacity-50 disabled:cursor-not-allowed
               sm:text-sm sm:leading-6"
      />
    </section>
  </div>
</body>
</html>

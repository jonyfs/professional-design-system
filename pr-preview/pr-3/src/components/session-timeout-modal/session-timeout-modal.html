<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Session Timeout Modal — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-3/assets/sessionTimeoutModal-CeUxpZSJ.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-BONmeeIS.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/gallery-theme-selector-AmolPRc9.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/overlay-TYHDIv5r.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-D_G8CahU.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-3/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Session Timeout Modal</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Idle-timeout warning with a live countdown — reuses Modal's exact
    focus-trapped &lt;dialog&gt; mechanism verbatim, adding only the
    countdown itself.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8">
    <button type="button" id="session-timeout-trigger" data-testid="session-timeout-trigger" class="btn-secondary">
      Simulate session timeout warning
    </button>
  </div>

  <dialog id="session-timeout-dialog" data-testid="session-timeout-dialog" aria-labelledby="session-timeout-title" class="modal-dialog">
    <div class="modal-panel">
      <div class="flex items-start justify-between gap-4">
        <h2 id="session-timeout-title" class="text-lg font-semibold text-neutral-900">
          Session about to expire
        </h2>
        <form method="dialog">
          <button type="submit" data-testid="session-timeout-close" aria-label="Close" class="close-icon-btn">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
              <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
            </svg>
          </button>
        </form>
      </div>
      <p class="mt-2 text-sm text-neutral-600">
        You'll be signed out in
        <span id="session-timeout-countdown" data-testid="session-timeout-countdown" aria-live="polite">30s</span>
        <span id="session-timeout-expired" data-testid="session-timeout-expired" aria-live="polite" hidden>You have been signed out.</span>
      </p>
      <div class="mt-6 flex justify-end gap-3">
        <form method="dialog">
          <button type="submit" data-testid="session-timeout-logout" class="btn-secondary">Log out now</button>
        </form>
        <button type="button" id="session-timeout-stay" data-testid="session-timeout-stay" class="btn-primary">
          Stay signed in
        </button>
      </div>
    </div>
  </dialog>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Divider — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-NAOvpRiF.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-3/assets/gallery-theme-selector-4_iKoj2_.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-uR57PTZh.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-3/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Divider</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="divider-demo-wrapper" class="mt-8 max-w-md space-y-8">
    <section class="space-y-2">
      <h2 class="text-sm font-semibold text-neutral-600">Semantic thematic break</h2>
      <p class="text-sm text-neutral-900">First section content.</p>
      <hr data-testid="divider-semantic-horizontal" class="divider" />
      <p class="text-sm text-neutral-900">Second section content.</p>
    </section>

    <section class="space-y-2">
      <h2 class="text-sm font-semibold text-neutral-600">
        Non-semantic horizontal break (e.g. between two flex rows)
      </h2>
      <p class="text-sm text-neutral-900">Row one.</p>
      <div data-testid="divider-nonsemantic-horizontal" role="separator" class="divider"></div>
      <p class="text-sm text-neutral-900">Row two.</p>
    </section>

    <section class="space-y-2">
      <h2 class="text-sm font-semibold text-neutral-600">
        Non-semantic vertical break (e.g. inside a toolbar)
      </h2>
      <div class="flex h-8 items-center gap-3">
        <span class="text-sm text-neutral-900">Edit</span>
        <div
          data-testid="divider-nonsemantic-vertical"
          role="separator"
          aria-orientation="vertical"
          class="divider-vertical"
        ></div>
        <span class="text-sm text-neutral-900">Duplicate</span>
        <div role="separator" aria-orientation="vertical" class="divider-vertical"></div>
        <span class="text-sm text-neutral-900">Delete</span>
      </div>
    </section>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Modal — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-3/assets/modal-CIbj9EIw.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-BONmeeIS.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/gallery-theme-selector-AmolPRc9.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/overlay-TYHDIv5r.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-3/assets/theme-switcher-D_G8CahU.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-3/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Modal</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 flex flex-wrap gap-4">
    <button type="button" data-testid="modal-trigger" data-dialog-trigger="modal-example" class="btn-primary">
      Delete item
    </button>
    <button
      type="button"
      data-testid="modal-info-trigger"
      data-dialog-trigger="modal-info"
      class="btn-secondary"
    >
      Show informational modal (no buttons, Edge Case)
    </button>
  </div>

  <dialog id="modal-example" data-testid="modal" aria-labelledby="modal-title" class="modal-dialog">
    <div class="modal-panel">
      <div class="flex items-start justify-between gap-4">
        <h2 id="modal-title" class="text-lg font-semibold text-neutral-900">
          Delete item?
        </h2>
        <form method="dialog">
          <button
            type="submit"
            data-testid="modal-close"
            aria-label="Close"
            class="close-icon-btn"
          >
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
              <path
                d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
              />
            </svg>
          </button>
        </form>
      </div>
      <p class="mt-2 text-sm text-neutral-600">
        This action cannot be undone. The item will be permanently removed.
      </p>
      <form method="dialog" class="mt-6 flex justify-end gap-3">
        <button type="submit" data-testid="modal-cancel" class="btn-secondary">
          Cancel
        </button>
        <button type="submit" data-testid="modal-confirm" class="btn-primary">
          Delete
        </button>
      </form>
    </div>
  </dialog>

  <dialog
    id="modal-info"
    data-testid="modal-info"
    tabindex="-1"
    aria-labelledby="modal-info-title"
    class="modal-dialog"
  >
    <div class="modal-panel">
      <h2 id="modal-info-title" class="text-lg font-semibold text-neutral-900">
        Processing…
      </h2>
      <p class="mt-2 text-sm text-neutral-600">This will only take a moment.</p>
    </div>
  </dialog>

</body>
</html>

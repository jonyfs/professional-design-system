<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Context Menu — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-17/assets/contextMenu-DzqmfmCZ.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-17/assets/theme-switcher-C9xufxBd.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-17/assets/gallery-theme-selector-CqNjUKs-.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-17/assets/theme-switcher-C3Rib2Ti.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-17/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Context Menu</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Right-click the row below — the menu appears at the cursor position,
    not anchored to a fixed trigger.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="context-menu-demo-wrapper" class="mt-8 max-w-md">
    <div
      data-testid="context-menu-target"
      data-context-menu-target="context-menu-panel"
      tabindex="0"
      class="flex items-center justify-between rounded-md border border-neutral-200 px-4 py-3"
    >
      <div class="flex flex-col">
        <span class="text-sm font-medium text-neutral-900">Q3 marketing budget.xlsx</span>
        <span class="text-xs text-neutral-600">Edited 2 hours ago</span>
      </div>
      <span class="text-xs text-neutral-600" aria-hidden="true">Right-click for options</span>
    </div>

    <div
      id="context-menu-panel"
      data-testid="context-menu-panel"
      popover="auto"
      role="menu"
      aria-label="File actions"
      class="dropdown-menu-panel"
    >
      <button
        type="button"
        role="menuitem"
        class="dropdown-menu-item"
        data-testid="context-menu-item-open"
      >
        Open
      </button>
      <button
        type="button"
        role="menuitem"
        class="dropdown-menu-item"
        data-testid="context-menu-item-rename"
      >
        Rename
      </button>
      <button
        type="button"
        role="menuitem"
        disabled
        class="dropdown-menu-item"
        data-testid="context-menu-item-delete"
      >
        Delete
      </button>
    </div>
  </div>

</body>
</html>

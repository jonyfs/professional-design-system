<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>International Phone Input — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-12/assets/phoneIntlInput-2leV5K_C.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-12/assets/localized-inputs-BfAiXy9W.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-12/assets/theme-switcher-CK1zq0J9.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-12/assets/gallery-theme-selector-fnUSXzMm.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-12/assets/theme-switcher-CTsoR3_f.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-12/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">International Phone Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Displays the selected country's calling code alongside the typed
    national number, validated for correct overall length against that
    country's expected range — no network lookup.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-sm space-y-4">
    <div class="space-y-1">
      <label for="phone-intl-country" class="text-sm font-medium text-neutral-900">Country</label>
      <select
        id="phone-intl-country"
        data-testid="phone-intl-country"
        data-phone-intl-country-for="phone-intl-input"
        class="block w-full rounded-md border-0 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-neutral-300 focus:ring-2 focus:ring-inset focus:ring-brand
               sm:text-sm sm:leading-6"
      >
        <option value="BR">Brazil (+55)</option>
        <option value="US">United States (+1)</option>
        <option value="PT">Portugal (+351)</option>
        <option value="GB">United Kingdom (+44)</option>
        <option value="DE">Germany (+49)</option>
        <option value="FR">France (+33)</option>
        <option value="ES">Spain (+34)</option>
        <option value="AR">Argentina (+54)</option>
        <option value="JP">Japan (+81)</option>
        <option value="CN">China (+86)</option>
      </select>
    </div>

    <div class="space-y-1">
      <label for="phone-intl-input" class="text-sm font-medium text-neutral-900">International phone</label>
      <p id="phone-intl-input-calling-code" data-testid="phone-intl-calling-code" class="text-sm text-neutral-600">
        Calling code: +55
      </p>
      <input
        id="phone-intl-input"
        data-testid="phone-intl-input"
        data-phone-intl-input
        type="text"
        inputmode="numeric"
        aria-describedby="phone-intl-input-error"
        placeholder="11987654321"
        class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
               focus:ring-2 focus:ring-inset focus:ring-brand
               sm:text-sm sm:leading-6"
      />
      <p id="phone-intl-input-error" data-testid="phone-intl-input-error" class="hidden text-xs text-error-strong mt-1 font-medium" aria-live="polite"></p>
    </div>
  </div>

</body>
</html>

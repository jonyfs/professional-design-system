<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Menubar — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-13/assets/menubar-nKZeZOrE.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-13/assets/theme-switcher-DXyD5w_x.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-13/assets/gallery-theme-selector-PIzGrpvN.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-13/assets/dropdown-menu-BcXec4iT.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-13/assets/theme-switcher-D9iqhu9C.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-13/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Menubar</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Horizontal, keyboard-navigable application menu bar. Composes Dropdown
    Menu's existing panel mechanics (reused completely unmodified) with a
    new roving-tabindex layer between top-level triggers.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="menubar mt-8" role="menubar" aria-label="Application menu" data-menubar data-testid="menubar">
    <div class="relative inline-block">
      <button
        type="button"
        id="menubar-file-trigger"
        popovertarget="menubar-file-panel"
        aria-expanded="false"
        role="menuitem"
        class="menubar-trigger"
        data-testid="menubar-file-trigger"
        data-dropdown-trigger
        data-menubar-item
        tabindex="0"
      >
        File
      </button>
      <div id="menubar-file-panel" popover="auto" role="menu" aria-labelledby="menubar-file-trigger" class="dropdown-menu-panel" data-testid="menubar-file-panel">
        <button type="button" role="menuitem" class="dropdown-menu-item">New</button>
        <button type="button" role="menuitem" class="dropdown-menu-item">Open</button>
        <button type="button" role="menuitem" class="dropdown-menu-item">Save</button>
      </div>
    </div>
    <div class="relative inline-block">
      <button
        type="button"
        id="menubar-edit-trigger"
        popovertarget="menubar-edit-panel"
        aria-expanded="false"
        role="menuitem"
        class="menubar-trigger"
        data-testid="menubar-edit-trigger"
        data-dropdown-trigger
        data-menubar-item
        tabindex="-1"
      >
        Edit
      </button>
      <div id="menubar-edit-panel" popover="auto" role="menu" aria-labelledby="menubar-edit-trigger" class="dropdown-menu-panel" data-testid="menubar-edit-panel">
        <button type="button" role="menuitem" class="dropdown-menu-item">Cut</button>
        <button type="button" role="menuitem" class="dropdown-menu-item">Copy</button>
        <button type="button" role="menuitem" class="dropdown-menu-item">Paste</button>
      </div>
    </div>
    <div class="relative inline-block">
      <button
        type="button"
        id="menubar-view-trigger"
        popovertarget="menubar-view-panel"
        aria-expanded="false"
        role="menuitem"
        class="menubar-trigger"
        data-testid="menubar-view-trigger"
        data-dropdown-trigger
        data-menubar-item
        tabindex="-1"
      >
        View
      </button>
      <div id="menubar-view-panel" popover="auto" role="menu" aria-labelledby="menubar-view-trigger" class="dropdown-menu-panel" data-testid="menubar-view-panel">
        <button type="button" role="menuitem" class="dropdown-menu-item">Zoom In</button>
        <button type="button" role="menuitem" class="dropdown-menu-item">Zoom Out</button>
      </div>
    </div>
  </div>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Slider — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-18/assets/theme-switcher-DzYYuIjM.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-18/assets/gallery-theme-selector-CUstixbQ.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-18/assets/theme-switcher-BZ-ku4dm.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-18/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Slider</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Native <code>&lt;input type="range"&gt;</code> styled via
    <code>accent-color</code> — zero JavaScript, full native keyboard
    support (arrows, Home/End, Page Up/Down).
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="slider-demo-wrapper" class="mt-8 max-w-md space-y-8">
    <div>
      <label for="slider-volume" class="text-sm font-medium text-neutral-900">Volume</label>
      <input
        type="range"
        id="slider-volume"
        data-testid="slider-volume"
        min="0"
        max="100"
        step="1"
        value="60"
        class="slider mt-2 w-full"
      />
    </div>
    <div>
      <label for="slider-disabled" class="text-sm font-medium text-neutral-900">Disabled</label>
      <input
        type="range"
        id="slider-disabled"
        data-testid="slider-disabled"
        min="0"
        max="100"
        step="1"
        value="30"
        disabled
        class="slider mt-2 w-full"
      />
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self';" />
  <title>Avatar — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-18/assets/theme-switcher-DzYYuIjM.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-18/assets/gallery-theme-selector-CUstixbQ.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-18/assets/theme-switcher-BZ-ku4dm.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-18/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Avatar</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Zero-JavaScript circular avatar — image variant with required alt text,
    initials fallback when no image is available.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 flex flex-wrap items-center gap-6">
    <img
      src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2280%22%20height%3D%2280%22%3E%3Crect%20width%3D%2280%22%20height%3D%2280%22%20fill%3D%22%239CA3AF%22/%3E%3C/svg%3E"
      alt="Jane Cooper"
      data-testid="avatar-image-lg"
      class="avatar-img avatar-lg"
    />
    <span data-testid="avatar-fallback-lg" class="avatar-fallback avatar-lg" aria-label="Alex Morgan">
      AM
    </span>
    <img
      src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2264%22%20height%3D%2264%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20fill%3D%22%239CA3AF%22/%3E%3C/svg%3E"
      alt="Sam Rivera"
      data-testid="avatar-image-sm"
      class="avatar-img avatar-sm"
    />
    <span data-testid="avatar-fallback-sm" class="avatar-fallback avatar-sm" aria-label="Priya Singh">
      PS
    </span>
    <span data-testid="avatar-fallback-single" class="avatar-fallback avatar-lg" aria-label="Madonna">
      M
    </span>
  </div>
</body>
</html>

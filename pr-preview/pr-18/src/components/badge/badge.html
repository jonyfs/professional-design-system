<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Badge — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-18/assets/theme-switcher-DzYYuIjM.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-18/assets/gallery-theme-selector-CUstixbQ.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-18/assets/theme-switcher-BZ-ku4dm.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-18/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Badge</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <section class="mt-8">
    <h2 class="text-sm font-semibold text-neutral-600">Variants</h2>
    <div data-testid="badge-variants-row" class="mt-2 flex flex-wrap items-center gap-3 p-2">
      <span
        data-testid="badge-success"
        class="inline-flex items-center rounded-md bg-success/5 px-2 py-1 text-xs
               font-medium text-success-strong ring-1 ring-inset ring-success/20"
      >
        Success
      </span>

      <span
        data-testid="badge-error"
        class="inline-flex items-center rounded-md bg-error/5 px-2 py-1 text-xs
               font-medium text-error-strong ring-1 ring-inset ring-error/10"
      >
        Error
      </span>

      <span
        data-testid="badge-warning"
        class="inline-flex items-center rounded-md bg-warning/5 px-2 py-1 text-xs
               font-medium text-warning-strong ring-1 ring-inset ring-warning/10"
      >
        Warning
      </span>

      <span
        data-testid="badge-neutral"
        class="inline-flex items-center rounded-md bg-neutral-50 px-2 py-1 text-xs
               font-medium text-neutral-600 ring-1 ring-inset ring-neutral-500/10"
      >
        Neutral
      </span>
    </div>
  </section>

  <section class="mt-8">
    <h2 class="text-sm font-semibold text-neutral-600">Edge case — long label</h2>
    <div data-testid="badge-long-label-wrapper" class="mt-2 max-w-[10rem]">
      <span
        data-testid="badge-long-label"
        class="inline-flex max-w-full items-center rounded-md bg-neutral-50 px-2 py-1 text-xs
               font-medium text-neutral-600 ring-1 ring-inset ring-neutral-500/10"
      >
        <span class="truncate">A significantly longer status label than usual</span>
      </span>
    </div>
  </section>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Split Button — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-15/assets/splitButton-WCXhhVVq.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-D053nsZa.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/gallery-theme-selector-BBitSZ8M.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/dropdown-menu-BcXec4iT.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-BFsUttcx.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-15/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Split Button</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    A primary action segment plus an attached dropdown segment of alternate
    actions. The dropdown reuses the ratified Dropdown Menu panel mechanics
    verbatim (native Popover API + <code>initDropdownMenus()</code>) — same
    keyboard model, no new mechanism to learn.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <!-- flex justify-end: gives the right-aligned Dropdown Menu panel room to
       open without going off-screen at any viewport width (same rationale
       as dropdown-menu.html's own comment). -->
  <div class="mt-8 flex justify-end">
    <div class="relative inline-block text-left">
      <div class="split-button" role="group" aria-label="Save">
        <button
          type="button"
          data-testid="split-button-primary"
          data-split-primary
          class="split-button-primary"
        >
          Save
        </button>

        <button
          type="button"
          id="split-button-trigger"
          popovertarget="split-button-menu-panel"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-label="More save options"
          class="split-button-toggle"
          data-testid="split-button-trigger"
          data-dropdown-trigger
        >
          <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.17l3.71-3.94a.75.75 0 1 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>

      <div
        id="split-button-menu-panel"
        popover="auto"
        role="menu"
        aria-labelledby="split-button-trigger"
        class="dropdown-menu-panel"
        data-testid="split-button-menu"
      >
        <button type="button" role="menuitem" class="dropdown-menu-item" data-testid="split-item-draft">
          Save as draft
        </button>
        <button type="button" role="menuitem" class="dropdown-menu-item" data-testid="split-item-template">
          Save as template
        </button>
        <button type="button" role="menuitem" disabled class="dropdown-menu-item" data-testid="split-item-copy">
          Save a copy
        </button>
        <button type="button" role="menuitem" class="dropdown-menu-item" data-testid="split-item-all">
          Save all
        </button>
      </div>
    </div>
  </div>

  <!-- Polite live region reflecting which action fired (gives the demo an
       observable, CSP-compliant effect without console logging). -->
  <p data-testid="split-button-result" data-split-result aria-live="polite" class="mt-6 text-sm text-neutral-600"></p>

</body>
</html>

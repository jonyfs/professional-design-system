<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Team/Workspace Switcher — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-15/assets/teamSwitcher-DEd_YC-7.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-D053nsZa.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/gallery-theme-selector-BBitSZ8M.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/dropdown-menu-BcXec4iT.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/context-switcher-B8yfLgYD.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-BFsUttcx.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-15/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Team/Workspace Switcher</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Dropdown identity switcher — reuses Dropdown Menu's exact panel
    mechanics and Avatar's fallback chip verbatim.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 relative inline-block text-left">
    <button
      type="button"
      id="team-switcher-trigger"
      data-testid="team-switcher-trigger"
      popovertarget="team-switcher-panel"
      aria-expanded="false"
      data-dropdown-trigger
      data-context-switcher-trigger
      class="btn-secondary inline-flex items-center gap-2"
    >
      <span class="avatar-fallback" data-context-switcher-current-avatar data-testid="team-switcher-current-avatar">AC</span>
      <span data-context-switcher-current-label data-testid="team-switcher-current-label">Acme Inc</span>
    </button>
    <div
      id="team-switcher-panel"
      popover="auto"
      role="menu"
      aria-labelledby="team-switcher-trigger"
      class="dropdown-menu-panel"
      data-testid="team-switcher-panel"
    >
      <button type="button" role="menuitem" class="dropdown-menu-item flex items-center gap-2" data-context-switcher-option data-context-switcher-label="Acme Inc" data-context-switcher-avatar="AC" data-testid="team-switcher-option-acme">
        <span class="avatar-fallback avatar-sm">AC</span> Acme Inc
      </button>
      <button type="button" role="menuitem" class="dropdown-menu-item flex items-center gap-2" data-context-switcher-option data-context-switcher-label="Globex Corp" data-context-switcher-avatar="GC" data-testid="team-switcher-option-globex">
        <span class="avatar-fallback avatar-sm">GC</span> Globex Corp
      </button>
      <button type="button" role="menuitem" class="dropdown-menu-item flex items-center gap-2" data-context-switcher-option data-context-switcher-label="Initech" data-context-switcher-avatar="IN" data-testid="team-switcher-option-initech">
        <span class="avatar-fallback avatar-sm">IN</span> Initech
      </button>
    </div>
  </div>

</body>
</html>

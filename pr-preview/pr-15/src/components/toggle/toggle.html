<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Toggle — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-D053nsZa.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-15/assets/gallery-theme-selector-BBitSZ8M.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-BFsUttcx.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-15/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Toggle</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 grid max-w-sm gap-8">
    <div data-testid="toggle-off-wrapper" class="p-1">
      <label
        data-testid="toggle-off-label"
        class="group inline-flex cursor-pointer items-center gap-2"
      >
        <span class="relative inline-flex h-6 w-11 items-center">
          <input type="checkbox" data-testid="toggle-off-input" class="peer sr-only" />
          <span class="toggle-track"></span>
          <span class="toggle-dot"></span>
        </span>
        <span class="text-sm text-neutral-900 group-has-[:disabled]:opacity-50">
          Enable notifications
        </span>
      </label>
    </div>

    <div data-testid="toggle-on-wrapper" class="p-1">
      <label class="group inline-flex cursor-pointer items-center gap-2">
        <span class="relative inline-flex h-6 w-11 items-center">
          <input type="checkbox" checked class="peer sr-only" />
          <span class="toggle-track"></span>
          <span class="toggle-dot"></span>
        </span>
        <span class="text-sm text-neutral-900 group-has-[:disabled]:opacity-50">
          Enable notifications
        </span>
      </label>
    </div>

    <div data-testid="toggle-disabled-on-wrapper" class="p-1">
      <label
        data-testid="toggle-disabled-on-label"
        class="group inline-flex cursor-not-allowed items-center gap-2"
      >
        <span class="relative inline-flex h-6 w-11 items-center">
          <input
            type="checkbox"
            data-testid="toggle-disabled-on-input"
            checked
            disabled
            class="peer sr-only"
          />
          <span class="toggle-track"></span>
          <span class="toggle-dot"></span>
        </span>
        <span class="text-sm text-neutral-900 group-has-[:disabled]:opacity-50">
          Enable notifications (disabled + on, Edge Case)
        </span>
      </label>
    </div>
  </div>
</body>
</html>

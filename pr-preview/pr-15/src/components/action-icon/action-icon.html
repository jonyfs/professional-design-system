<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Action Icon — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-D053nsZa.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-15/assets/gallery-theme-selector-BBitSZ8M.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-15/assets/theme-switcher-BFsUttcx.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-15/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Action Icon</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Icon-only button reusing Button's variant system, sized square. A
    mandatory <code>aria-label</code> supplies the accessible name — there
    is no visible text label.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <section class="mt-8 space-y-4">
    <h2 class="text-lg font-semibold text-neutral-900">Primary</h2>
    <div class="flex flex-wrap items-center gap-4">
      <button type="button" data-testid="action-icon-primary" aria-label="Add item" class="action-icon action-icon-primary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path d="M10 3a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5h-5.5a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 10 3Z" />
        </svg>
      </button>

      <button type="button" data-testid="action-icon-primary-disabled" aria-label="Add item (disabled)" disabled class="action-icon action-icon-primary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path d="M10 3a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5h-5.5a.75.75 0 0 1 0-1.5h5.5v-5.5A.75.75 0 0 1 10 3Z" />
        </svg>
      </button>
    </div>
  </section>

  <section class="mt-8 space-y-4">
    <h2 class="text-lg font-semibold text-neutral-900">Secondary</h2>
    <div class="flex flex-wrap items-center gap-4">
      <button type="button" data-testid="action-icon-secondary" aria-label="More actions" class="action-icon action-icon-secondary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path d="M6 10a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm5.5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm4 1.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" />
        </svg>
      </button>

      <button type="button" data-testid="action-icon-secondary-disabled" aria-label="More actions (disabled)" disabled class="action-icon action-icon-secondary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path d="M6 10a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm5.5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm4 1.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" />
        </svg>
      </button>
    </div>
  </section>
</body>
</html>

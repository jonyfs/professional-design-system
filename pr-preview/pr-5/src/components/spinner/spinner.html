<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Spinner — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-5/assets/theme-switcher-Ya3DCjic.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-5/assets/gallery-theme-selector-DD_s0S9t.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-5/assets/theme-switcher-D6wAtWyx.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-5/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Spinner</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Zero-JavaScript rotating loading indicator, distinct from Progress's
    linear/determinate-capable bar.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="spinner-demo-wrapper" class="mt-8 flex flex-wrap items-center gap-6">
    <svg
      data-testid="spinner-sm"
      class="spinner spinner-sm motion-reduce:animate-none"
      role="status"
      aria-label="Loading"
      viewBox="0 0 24 24"
      fill="none"
    >
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
    <svg
      data-testid="spinner-lg"
      class="spinner spinner-lg motion-reduce:animate-none"
      role="status"
      aria-label="Loading"
      viewBox="0 0 24 24"
      fill="none"
    >
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
  </div>
</body>
</html>

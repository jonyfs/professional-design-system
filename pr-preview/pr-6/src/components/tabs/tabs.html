<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Tabs — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-6/assets/tabs-D8s8Zgeu.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-6/assets/theme-switcher-D1kspB1h.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-6/assets/gallery-theme-selector-BXTG8tXj.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-6/assets/theme-switcher-DIRuTibU.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-6/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Tabs</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    WAI-ARIA Tabs pattern — roving tabindex, Left/Right/Home/End arrow-key
    navigation.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-lg" data-testid="tabs" data-tabs>
    <div role="tablist" aria-label="Product information" class="tabs-list">
      <button
        type="button"
        role="tab"
        id="tab-details"
        aria-controls="panel-details"
        aria-selected="true"
        tabindex="0"
        class="tab-trigger"
        data-testid="tab-details"
      >
        Details
      </button>
      <button
        type="button"
        role="tab"
        id="tab-reviews"
        aria-controls="panel-reviews"
        aria-selected="false"
        tabindex="-1"
        class="tab-trigger"
        data-testid="tab-reviews"
      >
        Reviews
      </button>
      <button
        type="button"
        role="tab"
        id="tab-warranty"
        aria-controls="panel-warranty"
        aria-selected="false"
        tabindex="-1"
        disabled
        class="tab-trigger"
        data-testid="tab-warranty"
      >
        Warranty (disabled)
      </button>
      <button
        type="button"
        role="tab"
        id="tab-shipping"
        aria-controls="panel-shipping"
        aria-selected="false"
        tabindex="-1"
        class="tab-trigger"
        data-testid="tab-shipping"
      >
        Shipping
      </button>
    </div>
    <div id="panel-details" role="tabpanel" aria-labelledby="tab-details" tabindex="0" class="tab-panel" data-testid="panel-details">
      <p>Full product specifications and materials.</p>
    </div>
    <div id="panel-reviews" role="tabpanel" aria-labelledby="tab-reviews" tabindex="0" class="tab-panel" hidden data-testid="panel-reviews">
      <p>Customer reviews and ratings.</p>
    </div>
    <div id="panel-warranty" role="tabpanel" aria-labelledby="tab-warranty" tabindex="0" class="tab-panel" hidden data-testid="panel-warranty">
      <p>Warranty information is unavailable for this item.</p>
    </div>
    <div id="panel-shipping" role="tabpanel" aria-labelledby="tab-shipping" tabindex="0" class="tab-panel" hidden data-testid="panel-shipping">
      <p>Shipping options and estimated delivery times.</p>
    </div>
  </div>

</body>
</html>

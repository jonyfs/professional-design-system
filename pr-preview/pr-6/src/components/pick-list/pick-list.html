<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>PickList / Transfer — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-6/assets/pickList-BRkGFv0j.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-6/assets/theme-switcher-D1kspB1h.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-6/assets/gallery-theme-selector-BXTG8tXj.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-6/assets/theme-switcher-DIRuTibU.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-6/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">PickList / Transfer</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Dual-list transfer widget — reuses List's exact row markup and
    Checkbox's real markup, fully keyboard-operable.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-pick-list data-testid="pick-list-demo" class="mt-8 grid max-w-2xl grid-cols-[1fr_auto_1fr] gap-4">
    <div data-pick-list-source data-testid="pick-list-source" class="pick-list-panel">
      <label class="list-row" data-pick-list-row data-testid="pick-list-row-alice">
        <input type="checkbox" class="h-4 w-4 rounded-sm border-neutral-300 text-brand
               focus-visible:outline focus-visible:outline-2
               focus-visible:outline-offset-2 focus-visible:outline-brand" />
        <span class="list-row-title">Alice Johnson</span>
      </label>
      <label class="list-row" data-pick-list-row data-testid="pick-list-row-bob">
        <input type="checkbox" class="h-4 w-4 rounded-sm border-neutral-300 text-brand
               focus-visible:outline focus-visible:outline-2
               focus-visible:outline-offset-2 focus-visible:outline-brand" />
        <span class="list-row-title">Bob Martinez</span>
      </label>
      <label class="list-row" data-pick-list-row data-testid="pick-list-row-carla">
        <input type="checkbox" class="h-4 w-4 rounded-sm border-neutral-300 text-brand
               focus-visible:outline focus-visible:outline-2
               focus-visible:outline-offset-2 focus-visible:outline-brand" />
        <span class="list-row-title">Carla Diaz</span>
      </label>
      <p data-pick-list-empty class="list-row-metadata p-4" hidden>No available users.</p>
    </div>

    <div class="pick-list-controls">
      <button type="button" data-pick-list-move-right data-testid="pick-list-move-right" aria-label="Move selected right" class="action-icon action-icon-secondary">›</button>
      <button type="button" data-pick-list-move-all-right data-testid="pick-list-move-all-right" aria-label="Move all right" class="action-icon action-icon-secondary">»</button>
      <button type="button" data-pick-list-move-all-left data-testid="pick-list-move-all-left" aria-label="Move all left" class="action-icon action-icon-secondary">«</button>
      <button type="button" data-pick-list-move-left data-testid="pick-list-move-left" aria-label="Move selected left" class="action-icon action-icon-secondary">‹</button>
    </div>

    <div data-pick-list-destination data-testid="pick-list-destination" class="pick-list-panel">
      <p data-pick-list-empty class="list-row-metadata p-4">No members yet.</p>
    </div>
  </div>

</body>
</html>

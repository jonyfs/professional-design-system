<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Dropdown Menu — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-16/assets/dropdownMenu-TCgkiYBm.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-CBoWYAyy.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/gallery-theme-selector-DlEV3huJ.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/dropdown-menu-BcXec4iT.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-B1LrNHn3.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-16/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Dropdown Menu</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Native Popover API for open/close/light-dismiss — Escape, outside
    click, and Tab all close the menu.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <!-- flex justify-end: the panel's right edge anchors to the trigger's
       right edge (a right-aligned "..." menu, matching the ratified
       pattern's real-world use — a trigger at the right of a toolbar/
       card row). Pushing the trigger to the far right of a full-width
       row gives the panel room to open to its left at every viewport
       width, responsively — a trigger placed at the page's own left
       margin (as this demo previously was) has no such space at any
       width. -->
  <div class="mt-8 flex justify-end">
  <div class="relative inline-block text-left">
    <button
      type="button"
      id="dropdown-trigger"
      popovertarget="dropdown-menu-panel"
      aria-expanded="false"
      class="btn-secondary"
      data-testid="dropdown-trigger"
      data-dropdown-trigger
    >
      More actions
    </button>

    <div
      id="dropdown-menu-panel"
      popover="auto"
      role="menu"
      aria-labelledby="dropdown-trigger"
      class="dropdown-menu-panel"
      data-testid="dropdown-menu"
    >
      <button type="button" role="menuitem" class="dropdown-menu-item" data-testid="dropdown-item-edit">
        Edit
      </button>
      <button type="button" role="menuitem" class="dropdown-menu-item" data-testid="dropdown-item-duplicate">
        Duplicate
      </button>
      <button type="button" role="menuitem" disabled class="dropdown-menu-item" data-testid="dropdown-item-archive">
        Archive
      </button>
      <button type="button" role="menuitem" class="dropdown-menu-item" data-testid="dropdown-item-delete">
        Delete
      </button>
    </div>
  </div>
  </div>

</body>
</html>

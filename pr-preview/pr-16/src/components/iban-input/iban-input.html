  <title>IBAN Input — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-16/assets/ibanInput-DOZOtnsB.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/localized-inputs-BfAiXy9W.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-CBoWYAyy.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/gallery-theme-selector-DlEV3huJ.js">

<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-16/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">IBAN Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    International Bank Account Number — normalizes pasted values with or without spaces, groups into 4-character blocks, validated against the ISO 13616 mod-97 checksum.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-sm space-y-1">
    <label for="iban-input" class="text-sm font-medium text-neutral-900">IBAN</label>
    <input
      id="iban-input"
      data-testid="iban-input"
      data-code-type="iban"
      type="text"
      
      aria-describedby="iban-input-error"
      placeholder="GB82 WEST 1234 5698 7654 32"
      class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
               focus:ring-2 focus:ring-inset focus:ring-brand
               sm:text-sm sm:leading-6"
    />
    <p id="iban-input-error" data-testid="iban-input-error" class="hidden text-xs text-error-strong mt-1 font-medium" aria-live="polite"></p>
  </div>

</body>
</html>

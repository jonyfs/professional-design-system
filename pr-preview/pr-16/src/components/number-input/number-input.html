<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Number Input — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-16/assets/numberInput-DA2QU7ei.js"></script>
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-CBoWYAyy.js">
  <link rel="modulepreload" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/gallery-theme-selector-DlEV3huJ.js">
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-B1LrNHn3.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-16/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Number Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Text Input's ratified shell plus two increment/decrement steppers.
    Typing an out-of-bounds value clamps to <code>[min, max]</code> on blur;
    each stepper disables individually at its bound.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 grid max-w-sm gap-8">
    <section data-testid="number-input-wrapper" class="space-y-1">
      <label for="number-input" class="text-sm font-medium text-neutral-900">
        Quantity (0–10)
      </label>
      <div class="relative">
        <input
          id="number-input"
          data-testid="number-input"
          type="number"
          min="0"
          max="10"
          step="1"
          value="5"
          inputmode="numeric"
          class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 pr-16 text-neutral-900 shadow-sm
                 ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
                 focus:ring-2 focus:ring-inset focus:ring-brand
                 disabled:opacity-50 disabled:cursor-not-allowed
                 sm:text-sm sm:leading-6
                 [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
        />
        <div class="absolute inset-y-0 right-1 flex items-center gap-0.5">
          <button
            type="button"
            data-testid="number-input-decrement"
            aria-label="Decrement"
            class="flex h-6 w-6 items-center justify-center rounded-sm text-neutral-600
                   hover:text-neutral-900 active:text-neutral-900
                   focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand
                   disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <svg class="h-4 w-4" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M3.5 8h9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
          </button>
          <button
            type="button"
            data-testid="number-input-increment"
            aria-label="Increment"
            class="flex h-6 w-6 items-center justify-center rounded-sm text-neutral-600
                   hover:text-neutral-900 active:text-neutral-900
                   focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand
                   disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <svg class="h-4 w-4" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section data-testid="number-input-disabled-wrapper" class="space-y-1">
      <label for="number-input-disabled" class="text-sm font-medium text-neutral-900">
        Disabled
      </label>
      <div class="relative">
        <input
          id="number-input-disabled"
          data-testid="number-input-disabled"
          type="number"
          value="3"
          disabled
          class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 pr-9 text-neutral-900 shadow-sm
                 ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
                 focus:ring-2 focus:ring-inset focus:ring-brand
                 disabled:opacity-50 disabled:cursor-not-allowed
                 sm:text-sm sm:leading-6
                 [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
        />
      </div>
    </section>
  </div>

</body>
</html>

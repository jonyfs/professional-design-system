<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>ColorPicker/ColorInput — Professional Design System</title>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-CBoWYAyy.js"></script>
  <script type="module" crossorigin src="/professional-design-system/pr-preview/pr-16/assets/gallery-theme-selector-DlEV3huJ.js"></script>
  <link rel="stylesheet" crossorigin href="/professional-design-system/pr-preview/pr-16/assets/theme-switcher-B1LrNHn3.css">
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/professional-design-system/pr-preview/pr-16/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">ColorPicker/ColorInput</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Native <code>&lt;input type="color"&gt;</code> — zero JavaScript, a
    full OS-level color picker UI, complete keyboard operability, and a
    real hex value, all for free.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="color-input-demo-wrapper" class="mt-8 max-w-md space-y-8">
    <div>
      <label for="color-accent" class="text-sm font-medium text-neutral-900">Accent color</label>
      <input
        type="color"
        id="color-accent"
        value="#004BB3"
        class="color-input mt-2"
        data-testid="color-input-accent"
      />
    </div>
    <div>
      <label for="color-disabled" class="text-sm font-medium text-neutral-900">Disabled</label>
      <input
        type="color"
        id="color-disabled"
        value="#6B7280"
        disabled
        class="color-input mt-2"
        data-testid="color-input-disabled"
      />
    </div>
  </div>
</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Token discipline audit (Principle IV, NON-NEGOTIABLE)
        run: npm run audit:tokens

      - name: Contrast audit (Principle II, AAA, NON-NEGOTIABLE)
        run: npm run audit:contrast

      - name: Production build
        run: npm run build

  # Feature 041 — the E2E suite (6690+ tests across 6 browser/viewport
  # projects) was the long pole of every CI run (30-55 min in a single
  # serial job), and now directly gates the Pages deploy + auto-semver
  # pipeline (feature 039). Playwright's own built-in --shard flag
  # distributes the SAME full test set across parallel runners rather
  # than reducing or sampling what's tested (spec.md FR-001/FR-002) — a
  # GitHub Actions matrix job fails overall the instant any one shard
  # fails, so the "CI" workflow's conclusion feature 039's deploy-pages.yml
  # already keys off (workflow_run) still means "every shard passed."
  #
  # Feature 043 — this same job caused two follow-up problems, both
  # fixed here: (1) Linux visual baselines regenerated in a LOCAL Docker
  # container do not pixel-match this real ubuntu-latest runner
  # (anti-aliasing/font-hinting drift produced false-positive failures)
  # — baselines MUST only ever be (re)generated by running this job for
  # real on ubuntu-latest, never approximated locally (spec.md
  # FR-001/FR-002, research.md R1). (2) every shard re-downloaded
  # Playwright's browser binaries from scratch and reported to its own
  # separate HTML artifact — the cache step below and the
  # merge-reports job address that (spec.md FR-003/FR-005/FR-006).
  # Shard count went from 4 to 6 after baseline-metrics.md showed one
  # shard running more than 2x longer than its neighbors on a real run;
  # this repo's installed Playwright (1.61.1) does not expose
  # --shard-weights, so shard count is the tuning lever, not weights
  # (spec.md FR-011, research.md R2).
  e2e:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages/react (react-*.spec.ts consume its dist/ output)
        run: npm run build --workspace packages/react

      - name: Resolve installed Playwright version (cache key)
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (cold cache — downloads binaries + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS dependencies only (browsers already cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: E2E tests (visual regression + accessibility) — shard ${{ matrix.shard }}/6
        run: npx playwright test --shard=${{ matrix.shard }}/6

      - name: Upload blob report (shard ${{ matrix.shard }}/6) for merge-reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # Feature 043 — one aggregated report across all 6 shards, so a
  # developer never has to open more than one artifact to see which
  # exact test/project/shard failed (spec.md FR-005/FR-006/SC-004). A
  # missing shard artifact (e.g. a crashed runner) fails this job loudly
  # instead of silently passing, and this job only ever reports success
  # when every e2e shard already succeeded (needs: e2e — matrix
  # semantics already fail the upstream job if any shard fails), so the
  # exact "success means every shard passed" gate feature 039's
  # deploy-pages.yml relies on (workflow_run) is unchanged (spec.md
  # FR-007).
  merge-reports:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all shard blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-shard-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge blob reports into one HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-report
          path: playwright-report/
          retention-days: 14

      # Feature 043 (User Story 3) — functional/accessibility tests and
      # pixel-level visual-regression tests must be distinguishable in
      # the CI result (spec.md Acceptance Scenario US3.1). Every visual
      # test in tests/e2e/**/*.spec.ts already titles itself with
      # "visual baseline" (a pre-existing, near-universal convention —
      # see research.md R3), so this reuses that convention instead of
      # adding ~140 new per-test tags across 74 files. Per-test pass/fail
      # attribution by category is visible directly in the merged HTML
      # report above (a failing test's own title already says whether
      # it's a visual-baseline check); this step only adds a quick-glance
      # declared-test-count summary.
      - name: Functional vs. visual-regression breakdown (informational)
        run: |
          npx playwright test --list > all-tests.txt || true
          total=$(grep -c "›" all-tests.txt || true)
          visual=$(grep -ic "visual baseline" all-tests.txt || true)
          functional=$((total - visual))
          {
            echo "### E2E result breakdown"
            echo ""
            echo "Declared tests: **${total}** total — **${visual}** visual-regression (title contains \"visual baseline\"), **${functional}** functional/accessibility."
            echo ""
            echo "Per-test pass/fail attribution (which failed: behavior vs. visuals) is visible in the merged HTML report artifact (\`playwright-merged-report\`) — a failing test's own title already says whether it's a visual-baseline check."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail this job if any e2e shard failed
        if: needs.e2e.result != 'success'
        run: |
          echo "::error::One or more e2e shards did not succeed (result: ${{ needs.e2e.result }}) — see the e2e job for the failing shard(s). This job (merge-reports) still ran (if: always()) to publish the merged report showing what failed, but reports its own conclusion as failure so the overall CI workflow conclusion stays failure too."
          exit 1

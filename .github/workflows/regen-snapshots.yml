name: Regenerate Linux Snapshots (temporary, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages/react
        run: npm run build --workspace packages/react

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Update all Linux snapshots
        run: npx playwright test --update-snapshots || true

      - name: Commit and push updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: regenerate Linux visual baselines on real ubuntu-latest runner [skip ci]"
            git push origin main
          fi

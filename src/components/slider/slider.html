<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Slider — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Slider</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Native <code>&lt;input type="range"&gt;</code> styled via
    <code>accent-color</code> — zero JavaScript, full native keyboard
    support (arrows, Home/End, Page Up/Down).
  </p>

  <div data-testid="slider-demo-wrapper" class="mt-8 max-w-md space-y-8">
    <div>
      <label for="slider-volume" class="text-sm font-medium text-neutral-900">Volume</label>
      <input
        type="range"
        id="slider-volume"
        data-testid="slider-volume"
        min="0"
        max="100"
        step="1"
        value="60"
        class="slider mt-2 w-full"
      />
    </div>
    <div>
      <label for="slider-disabled" class="text-sm font-medium text-neutral-900">Disabled</label>
      <input
        type="range"
        id="slider-disabled"
        data-testid="slider-disabled"
        min="0"
        max="100"
        step="1"
        value="30"
        disabled
        class="slider mt-2 w-full"
      />
    </div>
  </div>
</body>
</html>

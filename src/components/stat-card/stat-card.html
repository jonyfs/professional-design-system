<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Stat/Metric Card — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Stat/Metric Card</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Pure composition of the existing <code>.card</code> class + typography
    tokens — no new CSS class needed.
  </p>

  <div data-testid="stat-card-demo-wrapper" class="mt-8 grid max-w-2xl grid-cols-1 gap-6 sm:grid-cols-2">
    <div class="card" data-testid="stat-card-positive">
      <p class="text-sm font-medium text-neutral-600">Monthly Revenue</p>
      <p class="mt-1 text-3xl font-bold text-neutral-900">$48,200</p>
      <p class="mt-2 flex items-center gap-1 text-sm">
        <span class="text-success-strong" aria-hidden="true">↑</span>
        <span class="text-success-strong">12%</span>
        <span class="text-neutral-600">vs last month</span>
      </p>
    </div>

    <div class="card" data-testid="stat-card-negative">
      <p class="text-sm font-medium text-neutral-600">Churn Rate</p>
      <p class="mt-1 text-3xl font-bold text-neutral-900">3.4%</p>
      <p class="mt-2 flex items-center gap-1 text-sm">
        <span class="text-error-strong" aria-hidden="true">↓</span>
        <span class="text-error-strong">0.6%</span>
        <span class="text-neutral-600">vs last month</span>
      </p>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Button Group — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Button Group</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Zero-JavaScript segmented control — native radio inputs sharing one
    <code>name</code>, styled as connected button segments.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div data-testid="button-group-demo-wrapper" class="mt-8 max-w-md">
    <div data-testid="button-group" class="button-group" role="group" aria-label="View mode">
      <input
        type="radio"
        name="view-mode"
        id="vm-list"
        data-testid="vm-list"
        value="list"
        class="sr-only"
        checked
      />
      <label for="vm-list" data-testid="vm-list-label" class="button-group-segment">List</label>

      <input
        type="radio"
        name="view-mode"
        id="vm-grid"
        data-testid="vm-grid"
        value="grid"
        class="sr-only"
      />
      <label for="vm-grid" data-testid="vm-grid-label" class="button-group-segment">Grid</label>

      <input
        type="radio"
        name="view-mode"
        id="vm-table"
        data-testid="vm-table"
        value="table"
        class="sr-only"
        disabled
      />
      <label for="vm-table" data-testid="vm-table-label" class="button-group-segment">Table</label>
    </div>
  </div>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

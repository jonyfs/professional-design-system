<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>SemiCircleProgress — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">SemiCircleProgress</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Half-circle gauge sharing RingProgress's underlying stroke-
    dashoffset mechanism (research.md R3), for dashboard-style dials.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 flex flex-wrap gap-8">
    <div class="text-center">
      <div
        data-testid="semi-circle-progress-30"
        class="semi-circle-progress"
        role="progressbar"
        aria-valuenow="30"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-labelledby="semi-label-30"
      >
        <span class="sr-only" id="semi-label-30">CPU usage: 30%</span>
        <svg width="80" height="44" viewBox="0 0 80 44">
          <path class="circular-progress-track" d="M 4 40 A 36 36 0 0 1 76 40" stroke-width="8" />
          <path
            class="circular-progress-fill"
            data-circular-progress-fill
            data-value="30"
            data-circumference="113.1"
            d="M 4 40 A 36 36 0 0 1 76 40"
            stroke-width="8"
            stroke-dasharray="113.1"
          />
        </svg>
      </div>
      <p class="mt-2 text-sm text-neutral-600">30%</p>
    </div>

    <div class="text-center">
      <div
        data-testid="semi-circle-progress-75"
        class="semi-circle-progress"
        role="progressbar"
        aria-valuenow="75"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-labelledby="semi-label-75"
      >
        <span class="sr-only" id="semi-label-75">CPU usage: 75%</span>
        <svg width="80" height="44" viewBox="0 0 80 44">
          <path class="circular-progress-track" d="M 4 40 A 36 36 0 0 1 76 40" stroke-width="8" />
          <path
            class="circular-progress-fill circular-progress-fill-warning"
            data-circular-progress-fill
            data-value="75"
            data-circumference="113.1"
            d="M 4 40 A 36 36 0 0 1 76 40"
            stroke-width="8"
            stroke-dasharray="113.1"
          />
        </svg>
      </div>
      <p class="mt-2 text-sm text-neutral-600">75%</p>
    </div>
  </div>

  <script type="module">
    import { initCircularProgress } from "/src/scripts/circular-progress.js";
    initCircularProgress();
  </script>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

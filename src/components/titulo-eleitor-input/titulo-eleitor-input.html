<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Título de Eleitor Input — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Título de Eleitor Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Brazilian voter registration number — validated against the official TSE check-digit algorithm.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-sm space-y-1">
    <label for="titulo-eleitor-input" class="text-sm font-medium text-neutral-900">Título de Eleitor</label>
    <input
      id="titulo-eleitor-input"
      data-testid="titulo-eleitor-input"
      data-code-type="titulo-eleitor"
      type="text"
      inputmode="numeric"
      aria-describedby="titulo-eleitor-input-error"
      placeholder="000000000000"
      class="block w-full rounded-md border-0 bg-neutral-50 py-1.5 text-neutral-900 shadow-sm
               ring-1 ring-inset ring-neutral-300 placeholder:text-neutral-600
               focus:ring-2 focus:ring-inset focus:ring-brand
               sm:text-sm sm:leading-6"
    />
    <p id="titulo-eleitor-input-error" data-testid="titulo-eleitor-input-error" class="hidden text-xs text-error-strong mt-1 font-medium" aria-live="polite"></p>
  </div>

  <script type="module">
    import { initLocalizedInputs } from "/src/scripts/localized-inputs.js";
    initLocalizedInputs();
  </script>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Command Palette — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Command Palette</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Press
    <kbd class="kbd">⌘K</kbd>
    or
    <kbd class="kbd">Ctrl K</kbd>
    from anywhere on this page to open it.
  </p>
  <p class="mt-4 text-sm text-neutral-600" data-testid="command-palette-hint">
    Shortcut: <strong>⌘K</strong> / <strong>Ctrl+K</strong>
  </p>

  <a href="#" class="back-link mt-8 inline-block" data-testid="unrelated-focus-target">An unrelated link, for focus-state testing</a>

  <dialog id="command-palette" data-testid="command-palette" class="command-palette-dialog">
    <input
      type="text"
      id="command-palette-input"
      role="combobox"
      aria-expanded="true"
      aria-controls="command-palette-list"
      aria-activedescendant=""
      aria-autocomplete="list"
      autocomplete="off"
      autofocus
      data-testid="command-palette-input"
      class="command-palette-input"
      placeholder="Type a command or search…"
    />
    <ul id="command-palette-list" role="listbox" data-testid="command-palette-list" class="command-palette-list"></ul>
  </dialog>

  <p aria-live="polite" data-testid="command-palette-confirmation" class="sr-only"></p>

  <script type="module">
    import { initCommandPalette } from "/src/scripts/command-palette.js";

    const actions = [
      "New Project", "Open Settings", "Invite Teammate (requires admin)",
      "Sign Out", "New Document", "New Folder", "Rename Item", "Move to Trash",
      "Duplicate", "Share Link", "Export as PDF", "Export as CSV",
      "Print", "Search Everywhere", "Open Command History", "Toggle Dark Mode",
      "Open Keyboard Shortcuts", "Report a Bug", "Contact Support", "View Changelog",
    ].map((label) => ({
      id: label.toLowerCase().replace(/\s+/g, "-"),
      label,
      disabled: label.includes("(requires admin)"),
    }));

    initCommandPalette({
      dialog: document.getElementById("command-palette"),
      input: document.getElementById("command-palette-input"),
      list: document.getElementById("command-palette-list"),
      confirmation: document.querySelector('[data-testid="command-palette-confirmation"]'),
      actions,
    });
  </script>
</body>
</html>

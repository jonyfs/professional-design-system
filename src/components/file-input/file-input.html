<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>File Input — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">File Input</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Native <code>&lt;input type="file"&gt;</code> in a styled drop-zone.
    Click-to-browse works natively; drag-and-drop is a static visual
    treatment only, with real DnD JS explicitly deferred (research.md R6).
  </p>

  <div data-testid="file-input-demo-wrapper" class="mt-8 max-w-md space-y-8">
    <div>
      <label for="file-upload" class="text-sm font-medium text-neutral-900">Attachment</label>
      <div class="file-drop-zone mt-2" data-testid="file-drop-zone">
        <input
          id="file-upload"
          type="file"
          accept=".png,.jpg,.jpeg,.pdf"
          class="file-input-native"
          data-file-input
          data-testid="file-input-native"
        />
        <div class="file-drop-zone-content">
          <svg aria-hidden="true" class="h-8 w-8 text-neutral-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5-5 5 5M12 5v12" />
          </svg>
          <p class="text-sm text-neutral-600">
            <span class="font-medium text-brand-dark">Click to upload</span> or drag and drop
          </p>
          <p class="text-xs text-neutral-600">PNG, JPG, or PDF up to 10MB</p>
        </div>
      </div>
      <p
        class="mt-2 text-sm text-neutral-600"
        data-testid="file-input-filename"
        data-file-input-filename="file-upload"
        hidden
      ></p>
    </div>

    <div>
      <label for="file-upload-disabled" class="text-sm font-medium text-neutral-900">Disabled</label>
      <div class="file-drop-zone mt-2" data-testid="file-drop-zone-disabled">
        <input
          id="file-upload-disabled"
          type="file"
          disabled
          class="file-input-native"
          data-file-input
          data-testid="file-input-native-disabled"
        />
        <div class="file-drop-zone-content" aria-disabled="true">
          <svg aria-hidden="true" class="h-8 w-8 text-neutral-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5-5 5 5M12 5v12" />
          </svg>
          <p class="text-sm text-neutral-600">Uploads disabled</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initFileInputs } from "/src/scripts/file-input.js";
    initFileInputs();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Empty State — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Empty State</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    A compositional recipe (no new CSS class) built from already-ratified
    utilities and the existing Button component.
  </p>

  <div
    data-testid="empty-state-demo-wrapper"
    class="mt-8 flex max-w-md flex-col items-center gap-3 rounded-lg border border-neutral-200 py-12 text-center"
  >
    <svg
      data-testid="empty-state-icon"
      aria-hidden="true"
      class="h-10 w-10 text-neutral-500"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.5"
        d="M9 13h6m-3-3v6m-9 3V7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"
      />
    </svg>
    <h2 data-testid="empty-state-heading" class="text-sm font-semibold text-neutral-900">
      No projects yet
    </h2>
    <p class="max-w-sm text-sm text-neutral-600">
      Get started by creating your first project.
    </p>
    <button type="button" class="btn-primary mt-2">New project</button>
  </div>
</body>
</html>

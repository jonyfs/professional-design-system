<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Popover — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Popover</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Click-triggered floating panel of arbitrary content, reusing Dropdown
    Menu's Popover-API + Anchor Positioning mechanism.
  </p>

  <div data-testid="popover-demo-wrapper" class="mt-16">
    <div class="relative inline-block">
      <button
        type="button"
        id="popover-trigger"
        data-testid="popover-trigger"
        data-popover-trigger
        popovertarget="popover-panel"
        aria-expanded="false"
        class="btn-secondary"
      >
        Share
      </button>
      <div
        id="popover-panel"
        data-testid="popover-panel"
        popover="auto"
        aria-labelledby="popover-trigger"
        class="popover-panel"
      >
        <p class="text-sm font-medium text-neutral-900">Share this project</p>
        <p class="mt-1 text-sm text-neutral-600">Anyone with the link can view.</p>
        <div class="mt-3 flex gap-2">
          <input
            type="text"
            readonly
            value="https://example.com/p/9f21a"
            class="block w-full rounded-md border-0 py-1.5 text-neutral-900
                   shadow-sm ring-1 ring-inset ring-neutral-300 sm:text-sm sm:leading-6"
          />
          <button type="button" class="btn-secondary">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initPopovers } from "/src/scripts/popover.js";
    initPopovers();
  </script>
</body>
</html>

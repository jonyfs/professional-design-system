<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>DataList — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">DataList</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Real semantic <code>&lt;dl&gt;</code>/<code>&lt;dt&gt;</code>/<code>&lt;dd&gt;</code>
    key-value pairs — no new CSS class needed.
  </p>

  <dl data-testid="data-list-demo" class="mt-8 grid max-w-md grid-cols-1 gap-x-4 gap-y-3 sm:grid-cols-2">
    <div>
      <dt class="text-sm font-medium text-neutral-900">Status</dt>
      <dd class="mt-1 text-sm text-neutral-600">Active</dd>
    </div>
    <div>
      <dt class="text-sm font-medium text-neutral-900">Created</dt>
      <dd class="mt-1 text-sm text-neutral-600">Jan 12, 2024</dd>
    </div>
    <div>
      <dt class="text-sm font-medium text-neutral-900">Owner</dt>
      <dd class="mt-1 text-sm text-neutral-600">Jane Cooper</dd>
    </div>
    <div>
      <dt class="text-sm font-medium text-neutral-900">Plan</dt>
      <dd class="mt-1 text-sm text-neutral-600">Enterprise</dd>
    </div>
  </dl>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>RollingNumber — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">RollingNumber</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    An animated numeric counter — digit transitions driven by
    requestAnimationFrame, the same throttling pattern this catalog's
    scroll-driven primitives already established.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <p class="mt-8 text-3xl font-bold text-neutral-900" data-rolling-number="1204" data-testid="rolling-number-demo" aria-live="polite">1,204</p>
  <div class="mt-3 flex gap-3">
    <button type="button" data-testid="rolling-number-increment" class="btn-secondary">+500</button>
    <button type="button" data-testid="rolling-number-decrement" class="btn-secondary">-500</button>
    <button type="button" data-testid="rolling-number-rapid" class="btn-secondary">Rapid changes (Edge Case)</button>
  </div>

  <script type="module">
    import { initRollingNumbers } from "/src/scripts/rolling-number.js";
    initRollingNumbers();

    const el = document.querySelector("[data-rolling-number]");
    function setValue(delta) {
      const next = Number(el.dataset.rollingNumber) + delta;
      el.dataset.rollingNumber = String(next);
      el._rollingNumberSetValue(next);
    }
    document.querySelector("[data-testid='rolling-number-increment']").addEventListener("click", () => setValue(500));
    document.querySelector("[data-testid='rolling-number-decrement']").addEventListener("click", () => setValue(-500));
    document.querySelector("[data-testid='rolling-number-rapid']").addEventListener("click", () => {
      setValue(100);
      setValue(200);
      setValue(300);
    });
  </script>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

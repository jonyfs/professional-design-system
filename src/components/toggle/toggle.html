<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toggle — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Toggle</h1>

  <div class="mt-8 grid max-w-sm gap-8">
    <div data-testid="toggle-off-wrapper" class="p-1">
      <label data-testid="toggle-off-label" class="inline-flex cursor-pointer items-center gap-2">
        <span class="relative inline-flex h-6 w-11 items-center">
          <input type="checkbox" data-testid="toggle-off-input" class="peer sr-only" />
          <span
            class="absolute inset-0 rounded-full ring-1 ring-inset ring-neutral-500
                   bg-neutral-200 transition-colors duration-200 ease-in-out
                   peer-checked:bg-brand
                   peer-focus-visible:outline peer-focus-visible:outline-2
                   peer-focus-visible:outline-offset-2 peer-focus-visible:outline-brand
                   peer-disabled:opacity-50 peer-disabled:cursor-not-allowed"
          ></span>
          <span
            class="pointer-events-none absolute left-0.5 h-5 w-5 translate-x-0 transform
                   rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out
                   peer-checked:translate-x-5 peer-disabled:opacity-50"
          ></span>
        </span>
        <span class="text-sm text-neutral-900">Enable notifications</span>
      </label>
    </div>

    <div data-testid="toggle-on-wrapper" class="p-1">
      <label class="inline-flex cursor-pointer items-center gap-2">
        <span class="relative inline-flex h-6 w-11 items-center">
          <input type="checkbox" checked class="peer sr-only" />
          <span
            class="absolute inset-0 rounded-full ring-1 ring-inset ring-neutral-500
                   bg-neutral-200 transition-colors duration-200 ease-in-out
                   peer-checked:bg-brand
                   peer-focus-visible:outline peer-focus-visible:outline-2
                   peer-focus-visible:outline-offset-2 peer-focus-visible:outline-brand
                   peer-disabled:opacity-50 peer-disabled:cursor-not-allowed"
          ></span>
          <span
            class="pointer-events-none absolute left-0.5 h-5 w-5 translate-x-0 transform
                   rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out
                   peer-checked:translate-x-5 peer-disabled:opacity-50"
          ></span>
        </span>
        <span class="text-sm text-neutral-900">Enable notifications</span>
      </label>
    </div>

    <div data-testid="toggle-disabled-on-wrapper" class="p-1">
      <label
        data-testid="toggle-disabled-on-label"
        class="inline-flex cursor-not-allowed items-center gap-2"
      >
        <span class="relative inline-flex h-6 w-11 items-center">
          <input
            type="checkbox"
            data-testid="toggle-disabled-on-input"
            checked
            disabled
            class="peer sr-only"
          />
          <span
            class="absolute inset-0 rounded-full ring-1 ring-inset ring-neutral-500
                   bg-neutral-200 transition-colors duration-200 ease-in-out
                   peer-checked:bg-brand
                   peer-focus-visible:outline peer-focus-visible:outline-2
                   peer-focus-visible:outline-offset-2 peer-focus-visible:outline-brand
                   peer-disabled:opacity-50 peer-disabled:cursor-not-allowed"
          ></span>
          <span
            class="pointer-events-none absolute left-0.5 h-5 w-5 translate-x-0 transform
                   rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out
                   peer-checked:translate-x-5 peer-disabled:opacity-50"
          ></span>
        </span>
        <span class="text-sm text-neutral-900">
          Enable notifications (disabled + on, Edge Case)
        </span>
      </label>
    </div>
  </div>
</body>
</html>

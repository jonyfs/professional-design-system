<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Textarea — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Textarea</h1>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 grid max-w-sm gap-8">
    <section data-testid="textarea-default-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">Default / focus</h2>
      <label for="textarea-default" class="text-sm font-medium text-neutral-900">
        Description
      </label>
      <textarea
        id="textarea-default"
        data-testid="textarea-default"
        rows="4"
        class="mt-1 block w-full resize-y rounded-md border-0 py-1.5
               text-neutral-900 shadow-sm ring-1 ring-inset ring-neutral-300
               placeholder:text-neutral-600 focus:ring-2 focus:ring-inset
               focus:ring-brand sm:text-sm sm:leading-6"
        placeholder="Tell us about your project..."
      ></textarea>
    </section>

    <section data-testid="textarea-error-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">Error</h2>
      <label for="textarea-error" class="text-sm font-medium text-neutral-900">
        Description
      </label>
      <textarea
        id="textarea-error"
        data-testid="textarea-error"
        rows="4"
        aria-invalid="true"
        aria-describedby="textarea-error-message"
        class="mt-1 block w-full resize-y rounded-md border-0 py-1.5
               text-neutral-900 shadow-sm ring-1 ring-inset ring-error
               focus:ring-2 focus:ring-inset focus:ring-error
               sm:text-sm sm:leading-6"
      >Too short.</textarea>
      <p id="textarea-error-message" class="text-xs text-error-strong mt-1 font-medium">
        Description must be at least 20 characters.
      </p>
    </section>

    <section data-testid="textarea-disabled-wrapper" class="space-y-1">
      <h2 class="text-sm font-semibold text-neutral-600">Disabled</h2>
      <label for="textarea-disabled" class="text-sm font-medium text-neutral-900">
        Description
      </label>
      <textarea
        id="textarea-disabled"
        data-testid="textarea-disabled"
        rows="4"
        disabled
        class="mt-1 block w-full resize-y rounded-md border-0 py-1.5
               text-neutral-900 shadow-sm ring-1 ring-inset ring-neutral-300
               placeholder:text-neutral-600 focus:ring-2 focus:ring-inset
               focus:ring-brand disabled:opacity-50 disabled:cursor-not-allowed
               sm:text-sm sm:leading-6"
      >Locked while under review.</textarea>
    </section>
  </div>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

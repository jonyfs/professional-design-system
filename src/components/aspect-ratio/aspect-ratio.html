<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self';" />
  <title>AspectRatio — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">AspectRatio</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Zero-JavaScript media wrapper preventing layout shift — no new CSS
    class needed, just the standard <code>aspect-ratio</code> property via
    Tailwind's <code>aspect-*</code> utilities.
  </p>

  <div data-testid="aspect-ratio-demo-wrapper" class="mt-8 grid max-w-2xl grid-cols-1 gap-6 sm:grid-cols-3">
    <div>
      <h2 class="mb-2 text-sm font-semibold text-neutral-600">16:9</h2>
      <div data-testid="aspect-ratio-16-9" class="aspect-[16/9] w-full overflow-hidden rounded-md bg-neutral-200">
        <img
          src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22320%22%20height%3D%22180%22%3E%3Crect%20width%3D%22320%22%20height%3D%22180%22%20fill%3D%22%239CA3AF%22/%3E%3C/svg%3E"
          alt="Example 16 by 9 media placeholder"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
    <div>
      <h2 class="mb-2 text-sm font-semibold text-neutral-600">1:1</h2>
      <div data-testid="aspect-ratio-1-1" class="aspect-square w-full overflow-hidden rounded-md bg-neutral-200">
        <img
          src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22200%22%20height%3D%22200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%239CA3AF%22/%3E%3C/svg%3E"
          alt="Example square media placeholder"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
    <div>
      <h2 class="mb-2 text-sm font-semibold text-neutral-600">4:3</h2>
      <div data-testid="aspect-ratio-4-3" class="aspect-[4/3] w-full overflow-hidden rounded-md bg-neutral-200">
        <img
          src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22320%22%20height%3D%22240%22%3E%3Crect%20width%3D%22320%22%20height%3D%22240%22%20fill%3D%22%239CA3AF%22/%3E%3C/svg%3E"
          alt="Example 4 by 3 media placeholder"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
  </div>
</body>
</html>

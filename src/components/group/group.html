<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Group — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Group</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Horizontal spacing primitive — a wrapping row with consistent gaps,
    for toolbars and button rows.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 max-w-md space-y-8">
    <section class="space-y-2">
      <h2 class="text-sm font-semibold text-neutral-600">Button toolbar (group-row-sm)</h2>
      <div data-testid="group-buttons" class="group-row group-row-sm rounded-lg border border-neutral-200 p-4">
        <button type="button" class="btn-primary">Save</button>
        <button type="button" class="btn-secondary">Cancel</button>
        <button type="button" class="btn-secondary">Delete</button>
      </div>
    </section>

    <section class="space-y-2">
      <h2 class="text-sm font-semibold text-neutral-600">Wraps at narrow viewports (group-row-md)</h2>
      <div data-testid="group-wrap" class="group-row group-row-md rounded-lg border border-neutral-200 p-4">
        <span class="rounded-md bg-neutral-100 px-2 py-1 text-xs font-medium text-neutral-700">Design</span>
        <span class="rounded-md bg-neutral-100 px-2 py-1 text-xs font-medium text-neutral-700">Engineering</span>
        <span class="rounded-md bg-neutral-100 px-2 py-1 text-xs font-medium text-neutral-700">Product</span>
        <span class="rounded-md bg-neutral-100 px-2 py-1 text-xs font-medium text-neutral-700">Marketing</span>
        <span class="rounded-md bg-neutral-100 px-2 py-1 text-xs font-medium text-neutral-700">Sales</span>
      </div>
    </section>
  </div>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

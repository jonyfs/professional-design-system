<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Toast — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
</head>
<body class="page-shell">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Toast</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Transient, non-modal notifications. This demo renders all three variants
    statically, stacked as they would appear in a live page.
  </p>

  <div data-testid="toast-stack" class="toast-stack w-full sm:max-w-sm">
    <div role="status" aria-live="polite" data-testid="toast-success" class="toast">
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5 shrink-0 text-success-strong" aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
          clip-rule="evenodd"
        />
      </svg>
      <p class="flex-1 text-sm font-medium text-neutral-900">Changes saved successfully.</p>
      <button type="button" data-testid="toast-close" aria-label="Dismiss notification" class="close-icon-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path
            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
          />
        </svg>
      </button>
    </div>

    <div role="status" aria-live="polite" data-testid="toast-error" class="toast">
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5 shrink-0 text-error-strong" aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z"
          clip-rule="evenodd"
        />
      </svg>
      <p class="flex-1 text-sm font-medium text-neutral-900">Failed to save changes.</p>
      <button type="button" data-testid="toast-close" aria-label="Dismiss notification" class="close-icon-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path
            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
          />
        </svg>
      </button>
    </div>

    <div role="status" aria-live="polite" data-testid="toast-info" class="toast">
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5 shrink-0 text-brand-dark" aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z"
          clip-rule="evenodd"
        />
      </svg>
      <p class="flex-1 text-sm font-medium text-neutral-900">A new version is available.</p>
      <button type="button" data-testid="toast-close" aria-label="Dismiss notification" class="close-icon-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5" aria-hidden="true">
          <path
            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
          />
        </svg>
      </button>
    </div>
  </div>

  <script type="module">
    import { initToastDismissal } from "/src/scripts/toast.js";
    initToastDismissal();
  </script>
</body>
</html>

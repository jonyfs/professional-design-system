<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Composed Example — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Composed Example</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    A settings section combining Textarea, Divider, Button Group, and
    Tooltip — every class used below is an already-ratified utility or
    component class (spec.md SC-003), nothing one-off.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div
    data-testid="composed-example-wrapper"
    class="mt-8 max-w-md rounded-lg border border-neutral-200 p-6"
  >
    <div class="space-y-1">
      <label for="composed-bio" class="text-sm font-medium text-neutral-900">Bio</label>
      <textarea
        id="composed-bio"
        rows="3"
        class="mt-1 block w-full resize-y rounded-md border-0 py-1.5
               text-neutral-900 shadow-sm ring-1 ring-inset ring-neutral-300
               placeholder:text-neutral-600 focus:ring-2 focus:ring-inset
               focus:ring-brand sm:text-sm sm:leading-6"
        placeholder="Tell us about yourself..."
      ></textarea>
    </div>

    <hr class="divider my-6" />

    <div class="space-y-2">
      <div class="flex items-center gap-2">
        <span class="text-sm font-medium text-neutral-900">Profile visibility</span>
        <span class="tooltip-wrapper">
          <button
            type="button"
            aria-describedby="composed-visibility-tooltip"
            class="text-neutral-500 hover:text-neutral-600 tooltip-anchor-3"
          >
            <span aria-hidden="true">ⓘ</span>
            <span class="sr-only">What does this control?</span>
          </button>
          <span
            role="tooltip"
            id="composed-visibility-tooltip"
            class="tooltip tooltip-top tooltip-target-3"
          >
            Controls who can see your profile
          </span>
        </span>
      </div>
      <div data-testid="composed-button-group" class="button-group" role="group" aria-label="Profile visibility">
        <input type="radio" name="composed-visibility" id="composed-public" value="public" class="sr-only" checked />
        <label for="composed-public" class="button-group-segment">Public</label>
        <input type="radio" name="composed-visibility" id="composed-private" value="private" class="sr-only" />
        <label for="composed-private" class="button-group-segment">Private</label>
      </div>
    </div>
  </div>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

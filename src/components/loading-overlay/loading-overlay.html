<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>LoadingOverlay — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">LoadingOverlay</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    A blocking spinner overlay scoped to a specific region, not the
    whole page — reuses Spinner's existing markup verbatim.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <button type="button" data-loading-toggle="loading-overlay-demo" data-testid="loading-overlay-toggle" class="btn-secondary">
    Toggle loading
  </button>

  <div id="loading-overlay-demo" data-testid="loading-overlay-container" aria-busy="false" class="loading-overlay-container mt-4 max-w-md rounded-lg border border-neutral-200 p-6">
    <p class="text-sm text-neutral-900">Table content goes here.</p>
    <button type="button" data-testid="loading-overlay-inner-button" class="btn-primary mt-3">Save</button>
    <div data-loading-overlay data-testid="loading-overlay" role="status" class="loading-overlay">
      <div class="loading-overlay-chip">
        <span class="sr-only">Loading</span>
        <svg class="spinner spinner-sm motion-reduce:animate-none" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
        <span aria-hidden="true" class="loading-overlay-label">Loading…</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { initLoadingOverlay } from "/src/scripts/loading-overlay.js";
    initLoadingOverlay();
  </script>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>

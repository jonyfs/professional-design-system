<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self';" />
  <title>Language Switcher — Professional Design System</title>
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <script type="module" src="/src/scripts/theme-switcher.js"></script>
</head>
<body class="page-shell">
  <div class="demo-page-header border-b border-neutral-200 pb-6 mb-6">
  <a href="/index.html" class="back-link">← Back to gallery</a>
  <h1 class="mt-4 text-2xl font-bold text-neutral-900">Language Switcher</h1>
  <p class="mt-2 max-w-md text-sm text-neutral-600">
    Dropdown identity switcher — reuses Dropdown Menu's exact panel
    mechanics verbatim, a content variant with no avatars.
  </p>

    <div class="mt-4 max-w-xs">
      <label for="gallery-theme-select" class="text-sm font-medium text-neutral-900">
        Preview theme
      </label>
      <select id="gallery-theme-select" data-testid="gallery-theme-select" class="form-select">
        <!-- <optgroup>/<option>s populated by gallery-theme-selector.js -->
      </select>
    </div>
  </div>

  <div class="mt-8 relative inline-block text-left">
    <button
      type="button"
      id="language-switcher-trigger"
      data-testid="language-switcher-trigger"
      popovertarget="language-switcher-panel"
      aria-expanded="false"
      data-dropdown-trigger
      data-context-switcher-trigger
      class="btn-secondary"
    >
      <span data-context-switcher-current-label data-testid="language-switcher-current-label">English</span>
    </button>
    <div
      id="language-switcher-panel"
      popover="auto"
      role="menu"
      aria-labelledby="language-switcher-trigger"
      class="dropdown-menu-panel"
      data-testid="language-switcher-panel"
    >
      <button type="button" role="menuitem" class="dropdown-menu-item" data-context-switcher-option data-context-switcher-label="English" data-testid="language-switcher-option-en">English</button>
      <button type="button" role="menuitem" class="dropdown-menu-item" data-context-switcher-option data-context-switcher-label="Português" data-testid="language-switcher-option-pt">Português</button>
      <button type="button" role="menuitem" class="dropdown-menu-item" data-context-switcher-option data-context-switcher-label="Español" data-testid="language-switcher-option-es">Español</button>
    </div>
  </div>

  <script type="module">
    import { initDropdownMenus } from "/src/scripts/dropdown-menu.js";
    import { initContextSwitchers } from "/src/scripts/context-switcher.js";
    initDropdownMenus();
    initContextSwitchers();
  </script>
  <script type="module" src="/src/scripts/gallery-theme-selector.js"></script>
</body>
</html>
